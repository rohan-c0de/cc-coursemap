name: Scrape Transfers

on:
  schedule:
    - cron: "0 10 * * 3,6" # Twice weekly (Wed/Sat) 10 AM UTC (5 AM EST)
  workflow_dispatch:
    inputs:
      state:
        description: "State to scrape (va/nc/sc/md/ga/de/ny/ri/vt/ct/dc/me or all)"
        default: "all"

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  # ── Virginia Transfer Scrapers ──────────────────────────────────────
  scrape-va-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'va'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        script:
          - va/scrape-transfer-equiv
          - va/scrape-transfer-gmu
          - va/scrape-transfer-odu
          - va/scrape-transfer-uva
          - va/scrape-transfer-vcu
          - va/scrape-transfer-vsu
          - va/scrape-transfer-umw
          - va/scrape-transfer-vwu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/${{ matrix.script }}.ts

  import-va-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'va'
    needs: scrape-va-transfers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/import-transfers.ts --state va

  # ── North Carolina Transfer Scrapers ────────────────────────────────
  scrape-nc-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'nc'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        script:
          - nc/scrape-transfer-cns
          - nc/scrape-transfer-catawba
          - nc/scrape-transfer-elon
          - nc/scrape-transfer-hpu
          - nc/scrape-transfer-ncstate
          - nc/scrape-transfer-uncg
          - nc/scrape-transfer-wingate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # scrape-transfer-wingate shells out to python3 -c "import pdfplumber".
      - name: Install pdfplumber
        run: pip install --quiet pdfplumber
      - run: npm ci
      - run: npx tsx scripts/${{ matrix.script }}.ts

  import-nc-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'nc'
    needs: scrape-nc-transfers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/import-transfers.ts --state nc

  # ── South Carolina Transfer Scrapers ────────────────────────────────
  scrape-sc-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'sc'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        script:
          - sc/scrape-transfer-clemson
          - sc/scrape-transfer-universities
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/${{ matrix.script }}.ts

  import-sc-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'sc'
    needs: scrape-sc-transfers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/import-transfers.ts --state sc

  # ── Georgia Transfers (GaTech + UGA + GSU + KSU + UWG) ──────────────
  # All GA scrapers share data/ga/transfer-equiv.json, so they must run
  # in a single job to merge correctly.
  scrape-ga-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'ga'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      # HTTP-based scrapers (no browser needed)
      - run: npx tsx scripts/ga/scrape-transfer-gatech.ts
      - run: npx tsx scripts/ga/scrape-transfer-uga.ts
      - run: npx tsx scripts/ga/scrape-transfer-gsu.ts
      # Playwright-based scrapers (BannerExtensibility AngularJS)
      - run: npx tsx scripts/ga/scrape-transfer-usg.ts --university ksu
      - run: npx tsx scripts/ga/scrape-transfer-usg.ts --university uwg

  # ── Delaware Transfers (UDel + CollegeTransfer.Net) ─────────────────
  scrape-de-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'de'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/de/scrape-transfer-udel.ts
      - run: npx tsx scripts/de/scrape-transfer-collegetransfer.ts

  # ── Maryland Transfers (ARTSYS) ─────────────────────────────────────
  scrape-md-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'md'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/md/scrape-transfer-artsys.ts
      - run: npx tsx scripts/import-transfers.ts --state md

  # ── New York Transfers (TREX) ───────────────────────────────────────
  # 7 CUNY community colleges → major NY universities via TREX public API.
  # TREX upstream is flaky — HTTP 500s are common and each triggers 3
  # retries with backoff, so runtime is dominated by wait-on-upstream.
  # 90 min gives headroom without failing every flaky run.
  # Scraper auto-imports to Supabase.
  scrape-ny-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'ny'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/ny/scrape-transfer-trex.ts

  # ── Rhode Island Transfers (TES math CAPTCHA — solvable) ────────────
  # CCRI → URI + RIC via TES Public View. The TES math CAPTCHA is solved
  # programmatically in the scraper, so this does run headlessly.
  # Scraper auto-imports to Supabase.
  scrape-ri-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'ri'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/ri/scrape-transfer.ts

  # ── Vermont Transfers ───────────────────────────────────────────────
  # CCV → VT universities. Scraper auto-imports to Supabase.
  scrape-vt-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'vt'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/vt/scrape-transfer.ts

  # ── Maine Transfers (MCCS via CollegeTransfer.Net OData) ────────────
  # 7 MCCS colleges; each has its own source-institution ID. Scraper
  # loops sources and merges into data/me/transfer-equiv.json. The
  # public OData API's free tier rate-limits after 4-5 sources, so
  # partial runs are expected — subsequent cron runs fill in the rest.
  # Scraper auto-imports to Supabase.
  scrape-me-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'me'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/me/scrape-transfer.ts

  # ── Washington DC Transfers (UDC via CollegeTransfer.Net OData) ─────
  # Single source institution (UDC, id 990) — paginates all outgoing
  # equivalencies (~1,400 mappings across ~48 target universities).
  # Scraper auto-imports to Supabase.
  scrape-dc-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'dc'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/dc/scrape-transfer.ts

  # ── Connecticut Transfers (CCSU + ECSU + SCSU via all-orchestrator) ─
  # scrape-transfer-all orchestrates the three university adapters
  # sequentially and merges into a single data/ct/transfer-equiv.json —
  # must run in one job to merge correctly (same pattern as GA transfers).
  # Orchestrator auto-imports to Supabase after merge.
  scrape-ct-transfers:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'ct'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/ct/scrape-transfer-all.ts
