name: Scrape Courses (Playwright)

on:
  schedule:
    - cron: "0 8 * * 1,3,5" # Every other day (Mon/Wed/Fri) 8 AM UTC (3 AM EST)
  workflow_dispatch:
    inputs:
      state:
        description: "State to scrape (nc/sc/md/va/vt/me or all)"
        default: "all"

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NODE_TLS_REJECT_UNAUTHORIZED: "0"

jobs:
  # ── Resolve terms ───────────────────────────────────────────────────
  # Auto-detect which terms to scrape. Replaces hardcoded VCCS_TERM env vars.
  resolve-terms:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      vccs_terms: ${{ steps.resolve.outputs.vccs_terms }}
      vccs_ps_terms: ${{ steps.resolve.outputs.vccs_ps_terms }}
      vccs_ps_codes: ${{ steps.resolve.outputs.vccs_ps_codes }}
      vccs_ps_json: ${{ steps.resolve.outputs.vccs_ps_json }}
      colleague_nc_terms: ${{ steps.resolve.outputs.colleague_nc_terms }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Resolve terms for all systems
        id: resolve
        run: |
          # VCCS (HTTP scraper terms)
          vccs=$(npx tsx scripts/lib/resolve-terms.ts --system vccs 2>/dev/null)
          echo "vccs_terms=$(echo "$vccs" | jq -r '.terms | join(",")')" >> "$GITHUB_OUTPUT"
          echo "Resolved VCCS terms: $(echo "$vccs" | jq -r '.terms | join(",")')" >&2

          # VCCS PeopleSoft (needs special term codes)
          vccs_ps=$(npx tsx scripts/lib/resolve-terms.ts --system vccs-ps 2>/dev/null)
          echo "vccs_ps_terms=$(echo "$vccs_ps" | jq -r '.terms | join(",")')" >> "$GITHUB_OUTPUT"
          echo "vccs_ps_codes=$(echo "$vccs_ps" | jq -r '.psTermCodes | join(",")')" >> "$GITHUB_OUTPUT"
          echo "vccs_ps_json=$(echo "$vccs_ps" | jq -r '.psJsonTerms | join(",")')" >> "$GITHUB_OUTPUT"
          echo "Resolved VCCS PS terms: $(echo "$vccs_ps" | jq -r '.terms | join(",")')" >&2

          # NC Colleague
          nc=$(npx tsx scripts/lib/resolve-terms.ts --system colleague-nc 2>/dev/null)
          echo "colleague_nc_terms=$(echo "$nc" | jq -r '.terms | join(",")')" >> "$GITHUB_OUTPUT"
          echo "Resolved NC terms: $(echo "$nc" | jq -r '.terms | join(",")')" >&2

  # ── NC Colleague (46 colleges, Playwright) ──────────────────────────
  scrape-nc-colleague:
    needs: resolve-terms
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'nc'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx tsx scripts/nc/scrape-colleague.ts --all --term "${{ needs.resolve-terms.outputs.colleague_nc_terms }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nc-colleague-courses
          path: data/nc/courses/
          retention-days: 7

  # ── SC Colleague (Playwright) ───────────────────────────────────────
  scrape-sc-colleague:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'sc'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx tsx scripts/sc/scrape-colleague.ts

  # ── MD Playwright scrapers (Colleague, Jenzabar) ────────────────────
  scrape-md-playwright:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'md'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        script:
          - md/scrape-colleague
          - md/scrape-jenzabar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx tsx scripts/${{ matrix.script }}.ts

  # ── VA PeopleSoft (Playwright — longest running) ────────────────────
  # Now scrapes each resolved term sequentially.
  scrape-va-peoplesoft:
    needs: resolve-terms
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'va'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Scrape PeopleSoft for each term
        run: |
          IFS=',' read -ra TERMS <<< "${{ needs.resolve-terms.outputs.vccs_ps_terms }}"
          IFS=',' read -ra CODES <<< "${{ needs.resolve-terms.outputs.vccs_ps_codes }}"
          IFS=',' read -ra JSONS <<< "${{ needs.resolve-terms.outputs.vccs_ps_json }}"

          for i in "${!TERMS[@]}"; do
            term="${TERMS[$i]}"
            code="${CODES[$i]:-}"
            json="${JSONS[$i]:-}"

            if [ -z "$code" ] || [ -z "$json" ]; then
              echo "WARNING: No PeopleSoft code mapping for '$term', skipping"
              continue
            fi

            echo "=== Scraping PeopleSoft: $term (code=$code, json=$json) ==="
            npx tsx scripts/va/scrape-peoplesoft.ts --term "$term"
            npx tsx scripts/va/enrich-peoplesoft.ts --term-code="$code" --json-term="$json"
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: va-peoplesoft-courses
          path: data/va/courses/
          retention-days: 7

  # ── Vermont (CCV Colleague SPA) ─────────────────────────────────────
  # Single college (Community College of Vermont) via shared VSC Colleague
  # Self-Service SPA. Scraper auto-imports to Supabase on success.
  scrape-vt:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'vt'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx tsx scripts/vt/scrape-colleague.ts

  # ── Maine (MCCS WordPress DataTables) ───────────────────────────────
  # 6 MCCS colleges via WordPress sites with client-side DataTables (JS
  # required, hence Playwright). KVCC excluded — it's PDF-only.
  # Writes local JSON only — needs explicit import-courses step.
  scrape-me:
    if: >-
      github.event_name == 'schedule' ||
      inputs.state == 'all' || inputs.state == 'me'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx tsx scripts/me/scrape-mccs.ts
      - run: npx tsx scripts/import-courses.ts --state me
