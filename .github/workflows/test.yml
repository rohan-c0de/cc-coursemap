name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run
      # Note: `npm run lint` is intentionally NOT run here. The existing
      # codebase has pre-existing lint errors in several scrapers; gating
      # this PR on lint would conflate unrelated cleanup with the test-
      # infrastructure work. Lint enforcement is tracked as a follow-up.
