name: Scraper coverage

on:
  pull_request:
    paths:
      - "lib/states/**"
      - "scripts/**"
      - "scripts/check-scraper-coverage.ts"
      - ".github/workflows/scraper-coverage.yml"
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run check:scrapers
